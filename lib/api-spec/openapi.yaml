openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: JARVIS Forge API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: jarvis
    description: JARVIS AI assistant operations
  - name: components
    description: Hardware component database
  - name: projects
    description: Design projects
  - name: simulation
    description: System simulation
  - name: documentation
    description: Documentation generation
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /jarvis/chat:
    post:
      operationId: jarvisChat
      tags: [jarvis]
      summary: Send message to JARVIS
      description: Send a message to JARVIS AI assistant and get a response
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatRequest"
      responses:
        "200":
          description: JARVIS response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatResponse"

  /components:
    get:
      operationId: listComponents
      tags: [components]
      summary: List hardware components
      description: Returns all available hardware components from the mock database
      responses:
        "200":
          description: Component list
          content:
            application/json:
              schema:
                type: object
                properties:
                  components:
                    type: array
                    items:
                      $ref: "#/components/schemas/HardwareComponent"
                required:
                  - components

  /components/{id}:
    get:
      operationId: getComponent
      tags: [components]
      summary: Get component by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Component details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HardwareComponent"
        "404":
          description: Component not found

  /projects:
    get:
      operationId: listProjects
      tags: [projects]
      summary: List design projects
      responses:
        "200":
          description: Project list
          content:
            application/json:
              schema:
                type: object
                properties:
                  projects:
                    type: array
                    items:
                      $ref: "#/components/schemas/Project"
                required:
                  - projects
    post:
      operationId: createProject
      tags: [projects]
      summary: Create a new project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectBody"
      responses:
        "201":
          description: Project created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"

  /projects/{id}:
    get:
      operationId: getProject
      tags: [projects]
      summary: Get project by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Project details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "404":
          description: Project not found

  /simulation/run:
    post:
      operationId: runSimulation
      tags: [simulation]
      summary: Run system simulation
      description: Simulate system behavior for the current design
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SimulationRequest"
      responses:
        "200":
          description: Simulation results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimulationResult"

  /documentation/generate:
    post:
      operationId: generateDocumentation
      tags: [documentation]
      summary: Generate technical documentation
      description: Generate spec sheet, BOM, and summary report for a project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DocumentationRequest"
      responses:
        "200":
          description: Generated documentation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentationResult"

  /projects/stats/summary:
    get:
      operationId: getProjectStats
      tags: [projects]
      summary: Get project dashboard stats
      description: Returns aggregate stats for the dashboard
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectStats"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ChatRequest:
      type: object
      properties:
        message:
          type: string
        projectId:
          type: string
        context:
          type: string
      required:
        - message

    ChatResponse:
      type: object
      properties:
        id:
          type: string
        message:
          type: string
        productDescription:
          type: string
        systemComponents:
          type: array
          items:
            type: string
        architecture:
          type: string
        suggestedComponentIds:
          type: array
          items:
            type: string
        timestamp:
          type: string
      required:
        - id
        - message
        - timestamp

    HardwareComponent:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        category:
          type: string
        spec:
          type: string
        estimatedCost:
          type: number
        description:
          type: string
        unit:
          type: string
        inStock:
          type: boolean
        powerDraw:
          type: number
        weight:
          type: number
      required:
        - id
        - name
        - category
        - spec
        - estimatedCost
        - description
        - unit
        - inStock

    Project:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        status:
          type: string
          enum: [concept, design, simulation, complete]
        componentIds:
          type: array
          items:
            type: string
        createdAt:
          type: string
        updatedAt:
          type: string
        simulationRun:
          type: boolean
        chatHistory:
          type: array
          items:
            $ref: "#/components/schemas/ChatMessage"
      required:
        - id
        - name
        - description
        - status
        - componentIds
        - createdAt
        - updatedAt
        - simulationRun
        - chatHistory

    ChatMessage:
      type: object
      properties:
        id:
          type: string
        role:
          type: string
          enum: [user, jarvis]
        content:
          type: string
        timestamp:
          type: string
      required:
        - id
        - role
        - content
        - timestamp

    CreateProjectBody:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        componentIds:
          type: array
          items:
            type: string
      required:
        - name
        - description

    SimulationRequest:
      type: object
      properties:
        projectId:
          type: string
        componentIds:
          type: array
          items:
            type: string
        durationHours:
          type: number
      required:
        - projectId
        - componentIds

    SimulationResult:
      type: object
      properties:
        projectId:
          type: string
        powerOutput:
          type: number
        batteryLifeHours:
          type: number
        efficiency:
          type: number
        thermalRisk:
          type: string
          enum: [low, medium, high, critical]
        peakLoad:
          type: number
        avgLoad:
          type: number
        uptime:
          type: number
        warnings:
          type: array
          items:
            type: string
        timestamp:
          type: string
      required:
        - projectId
        - powerOutput
        - batteryLifeHours
        - efficiency
        - thermalRisk
        - peakLoad
        - avgLoad
        - uptime
        - warnings
        - timestamp

    DocumentationRequest:
      type: object
      properties:
        projectId:
          type: string
        includeSpecSheet:
          type: boolean
        includeBOM:
          type: boolean
        includeSummary:
          type: boolean
      required:
        - projectId

    DocumentationResult:
      type: object
      properties:
        projectId:
          type: string
        specSheet:
          type: string
        bom:
          type: array
          items:
            $ref: "#/components/schemas/BOMItem"
        summaryReport:
          type: string
        generatedAt:
          type: string
      required:
        - projectId
        - specSheet
        - bom
        - summaryReport
        - generatedAt

    BOMItem:
      type: object
      properties:
        componentId:
          type: string
        name:
          type: string
        quantity:
          type: integer
        unitCost:
          type: number
        totalCost:
          type: number
        spec:
          type: string
      required:
        - componentId
        - name
        - quantity
        - unitCost
        - totalCost
        - spec

    ProjectStats:
      type: object
      properties:
        totalProjects:
          type: integer
        activeProjects:
          type: integer
        completedProjects:
          type: integer
        totalComponents:
          type: integer
        simulationsRun:
          type: integer
        recentProjects:
          type: array
          items:
            $ref: "#/components/schemas/Project"
      required:
        - totalProjects
        - activeProjects
        - completedProjects
        - totalComponents
        - simulationsRun
        - recentProjects
