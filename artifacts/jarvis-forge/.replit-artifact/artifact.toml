kind = "web"
previewPath = "/"
title = "JARVIS Forge v1"
version = "1.0.0"
id = "artifacts/jarvis-forge"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26141

[services.development]
run = "pnpm --filter @workspace/jarvis-forge run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/jarvis-forge", "run", "build" ]
publicDir = "artifacts/jarvis-forge/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26141"
BASE_PATH = "/"
